<!-- localagent/web/templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalAgent Dashboard</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.8);
            --accent-primary: #58a6ff;
            --accent-secondary: #1f6feb;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --border-color: #30363d;
            --danger: #f85149;
            --success: #3fb950;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .dashboard-container {
            display: flex;
            width: 95vw;
            height: 90vh;
            gap: 20px;
            backdrop-filter: blur(10px);
            max-width: 1400px;
        }

        /* Sidebar & Stats */
        .sidebar {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto; /* Allow scrolling all monitor panels */
            padding-right: 5px;
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 { font-size: 1.2rem; margin-top: 0; color: var(--accent-primary); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        h3 { font-size: 0.9rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value { font-size: 1.5rem; font-weight: bold; color: white; display: block; }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); }

        /* Trust & Audit */
        .trust-log, .audit-log {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 0.85em;
        }

        .log-entry { margin-bottom: 8px; padding: 8px; background: #1a1a2e; border-radius: 6px; }

        /* Chat Hub */
        .chat-hub {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        #chat_history {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            position: relative;
            line-height: 1.5;
        }

        .message.you {
            align-self: flex-end;
            background: var(--accent-secondary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.agent {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        .message strong { display: block; font-size: 0.7rem; opacity: 0.7; margin-bottom: 5px; }

        .input-area {
            display: flex;
            padding: 20px;
            gap: 10px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--border-color);
        }

        input[type="text"] {
            flex-grow: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--accent-primary); }

        button {
            background: var(--accent-primary);
            color: var(--bg-color);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover { opacity: 0.9; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="panel">
                <h2>Security Monitor</h2>
                <div class="stat-grid">
                    <div class="stat-card">
                        <span class="stat-value" id="active_tokens">0</span>
                        <span class="stat-label">Active Tokens</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="memory_points">0</span>
                        <span class="stat-label">Memory Points</span>
                    </div>
                </div>
            </div>

            <div class="panel" style="max-height: 200px;">
                <h3>Learned Trust</h3>
                <div id="trust_status" style="max-height: 150px; overflow-y: auto;">
                    <small>Loading learned policies...</small>
                </div>
            </div>

            <div class="panel" style="flex-grow: 1; display: flex; flex-direction: column;">
                <h3>Audit Log (Live)</h3>
                <div class="audit-log" id="audit_log">
                    Loading audit events...
                </div>
            </div>

            <div class="panel" style="max-height: 320px; display: flex; flex-direction: column;">
                <h3>Sandbox Browser</h3>
                <div id="sandbox_browser" style="flex-grow: 1; overflow-y: auto; background: #0f0f17; padding: 12px; border-radius: 8px; font-size: 0.9em;">
                    Loading sandbox contents...
                </div>
            </div>
        </div>

        <!-- Chat Hub -->
        <div class="chat-hub panel">
            <h2>Chat Hub</h2>
            <div id="chat_history">
                <div class="message agent">
                    <strong>LocalAgent</strong>
                    LocalAgent online. v0.4.0 active.
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="user_input" placeholder="Enter secure instruction..." onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById("user_input");
            const message = input.value.trim();
            if (!message) return;

            addMessage("You", message, "you");
            input.value = "";

            const history = document.getElementById("chat_history");
            const agentMsgDiv = document.createElement("div");
            agentMsgDiv.className = "message agent";
            agentMsgDiv.innerHTML = `<strong>LocalAgent</strong> <span id="typing_indicator" style="opacity: 0.6;">thinking...</span>`;
            history.appendChild(agentMsgDiv);
            history.scrollTop = history.scrollHeight;

            try {
                const res = await fetch("/chat/stream", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({message: message})
                });

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                const typingIndicator = document.getElementById("typing_indicator");
                if (typingIndicator) typingIndicator.remove();

                while (true) {
                    const {value, done} = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            const dataStr = line.substring(6).trim();
                            if (dataStr === "[DONE]") break;
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.delta) {
                                    agentMsgDiv.innerHTML += data.delta;
                                    history.scrollTop = history.scrollHeight;
                                }
                            } catch(e) {}
                        }
                    }
                }
            } catch(e) {
                console.error("Chat error:", e);
                agentMsgDiv.innerHTML += " <span style='color:var(--danger);'>(connection error)</span>";
            }
        }

        function addMessage(sender, text, type) {
            const history = document.getElementById("chat_history");
            const div = document.createElement("div");
            div.className = `message ${type}`;
            div.innerHTML = `<strong>${sender}</strong>${text.replace(/\n/g, '<br>')}`;
            history.appendChild(div);
            history.scrollTop = history.scrollHeight;
        }

        async function updateDashboard() {
            try {
                // Update Stats
                const statsRes = await fetch("/stats");
                const stats = await statsRes.json();
                document.getElementById("active_tokens").textContent = stats.active_tokens || 0;
                document.getElementById("memory_points").textContent = stats.memory_stats?.total_events || 0;

                // Update Trust
                const trustRes = await fetch("/trust_status");
                const trust = await trustRes.json();
                const trustDiv = document.getElementById("trust_status");
                if (trust.learned_policies && trust.learned_policies.length > 0) {
                    trustDiv.innerHTML = trust.learned_policies.map(p => `
                        <div style="margin-bottom:6px; padding:6px; background:rgba(63, 185, 80, 0.1); border-left: 2px solid #3fb950; border-radius:4px;">
                            <strong style="color:#3fb950;">✅ ${p.intent}</strong><br>
                            <small>${p.reason}</small>
                        </div>
                    `).join("");
                } else {
                    trustDiv.innerHTML = "<small>No learned policies yet (8+ uses needed).</small>";
                }

                // Update Audit
                const auditRes = await fetch("/audit");
                const audit = await auditRes.json();
                const auditDiv = document.getElementById("audit_log");
                if (audit.audit && audit.audit.length > 0) {
                    auditDiv.innerHTML = audit.audit.map(e => {
                        const time = new Date(e.timestamp * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                        return `
                            <div class="log-entry">
                                <div style="display:flex; justify-content:space-between; font-size:0.8em;">
                                    <strong>${time}</strong>
                                    <span style="color:${e.granted ? '#3fb950' : '#f85149'}">${e.granted ? '✅ GRANTED' : '❌ DENIED'}</span>
                                </div>
                                <div style="margin-top:2px;"><strong>${e.intent}</strong> → ${e.resource}</div>
                            </div>
                        `;
                    }).join("");
                } else {
                    auditDiv.innerHTML = "<small>No recent events.</small>";
                }
            } catch(e) { console.error("Update error:", e); }
        }

        async function updateSandbox() {
            try {
                const res = await fetch("/sandbox_files");
                const data = await res.json();
                
                const div = document.getElementById("sandbox_browser");
                div.innerHTML = "";

                if (data.files && data.files.length > 0) {
                    data.files.forEach(file => {
                        const item = document.createElement("div");
                        item.style.marginBottom = "8px";
                        item.style.padding = "6px";
                        item.style.background = "#1a1a2e";
                        item.style.borderRadius = "4px";
                        item.innerHTML = `
                            📄 <strong>${file.name}</strong><br>
                            <small>${file.path} • ${file.size_kb} KB</small>
                        `;
                        div.appendChild(item);
                    });
                } else {
                    div.innerHTML = "<small>No files in sandbox yet.<br>Create some with the chat.</small>";
                }
            } catch(e) {
                console.error("Sandbox browser error:", e);
            }
        }

        setInterval(updateDashboard, 3000);
        setInterval(updateSandbox, 5000);
        updateDashboard();
        updateSandbox();
    </script>
</body>
</html>
