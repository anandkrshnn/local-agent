name: Build and Release Local Agent v0.3.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        default: '0.3.0'

jobs:
  # ============================================================
  # BUILD PYTHON PACKAGE
  # ============================================================
  build-python:
    name: Build Python Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Build distribution
        run: python -m build
      
      - name: Check distribution
        run: twine check dist/*
      
      - name: Upload Python artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
          retention-days: 7

  # ============================================================
  # BUILD FRONTEND
  # ============================================================
  build-frontend:
    name: Build Web Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      
      - name: Build frontend
        run: |
          cd frontend
          npm run build
      
      - name: Package Frontend
        run: |
          cd frontend/dist
          zip -r ../../frontend-build.zip .
      
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-build.zip
          retention-days: 7

  # ============================================================
  # CREATE GITHUB RELEASE
  # ============================================================
  create-release:
    name: Create GitHub Release
    needs: [build-python, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: |
          ls -la artifacts/
          find artifacts -type f
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/python-dist/*
            artifacts/frontend-dist/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # NOTIFY ON COMPLETION
  # ============================================================
  notify:
    name: Notification
    needs: create-release
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "========================================"
          echo "Build Summary for Local Agent v0.3.0"
          echo "========================================"
          echo "Python Core: ${{ needs.build-python.result }}"
          echo "Web Frontend: ${{ needs.build-frontend.result }}"
          echo "Release:     ${{ needs.create-release.result }}"
          echo "========================================"
