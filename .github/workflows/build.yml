name: Build and Release Local Agent v4.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: false
        default: '4.0.0'

jobs:
  # ============================================================
  # BUILD WINDOWS DESKTOP APP
  # ============================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd desktop
          npm install
      
      - name: Build Windows EXE
        run: |
          cd desktop
          npm run build:win
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: desktop/dist/*.exe
          retention-days: 30

  # ============================================================
  # BUILD macOS DESKTOP APP
  # ============================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd desktop
          npm install
      
      - name: Build macOS DMG
        run: |
          cd desktop
          npm run build:mac
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: desktop/dist/*.dmg
          retention-days: 30

  # ============================================================
  # BUILD LINUX DESKTOP APP
  # ============================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd desktop
          npm install
      
      - name: Build Linux AppImage
        run: |
          cd desktop
          npm run build:linux
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: desktop/dist/*.AppImage
          retention-days: 30

  # ============================================================
  # BUILD ANDROID APK
  # ============================================================
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd mobile
          npm install
      
      - name: Build Android APK
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

  # ============================================================
  # BUILD FRONTEND
  # ============================================================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      
      - name: Build frontend
        run: |
          cd frontend
          npm run build
      
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 30

  # ============================================================
  # CREATE GITHUB RELEASE
  # ============================================================
  create-release:
    needs: [build-windows, build-macos, build-linux, build-android, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List artifacts
        run: |
          ls -la artifacts/
          find artifacts -type f -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.apk"
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-installer/*.dmg
            artifacts/linux-installer/*.AppImage
            artifacts/android-apk/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # NOTIFY ON COMPLETION
  # ============================================================
  notify:
    needs: create-release
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "========================================"
          echo "Build Summary for Local Agent v4.0"
          echo "========================================"
          echo "Windows: ${{ needs.build-windows.result }}"
          echo "macOS:   ${{ needs.build-macos.result }}"
          echo "Linux:   ${{ needs.build-linux.result }}"
          echo "Android: ${{ needs.build-android.result }}"
          echo "Frontend: ${{ needs.build-frontend.result }}"
          echo "========================================"
