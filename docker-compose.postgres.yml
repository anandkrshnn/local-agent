# docker-compose.postgres.yml - PostgreSQL for Production

version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: local-agent-postgres
    environment:
      POSTGRES_DB: local_agent
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_here}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_user -d local_agent"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local-agent-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: local-agent-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local-agent.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - local-agent-network

networks:
  local-agent-network:
    driver: bridge

volumes:
  postgres_data:
